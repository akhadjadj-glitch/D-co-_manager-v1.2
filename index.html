.total-box span{color:#a5b4fc;font-size:12px}

.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.login-logo{font-size:64px;margin-bottom:16px}
.login-title{font-size:28px;font-weight:700;margin-bottom:8px}
.login-sub{font-size:14px;color:#64748b;margin-bottom:32px}
.login-box{background:rgba(255,255,255,0.05);border-radius:16px;padding:24px;width:100%;max-width:340px}
.login-tabs{display:flex;margin-bottom:20px;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px}

.code-input{font-size:24px;letter-spacing:8px;text-align:center;text-transform:uppercase;font-weight:700}

.upload-progress{background:rgba(99,102,241,0.2);border-radius:8px;padding:12px;margin:12px 0}

.upload-fill{height:100%;background:#6366f1;border-radius:2px;transition:width 0.3s}

<body>
<div id="app"><div class="loader"><div class="loader-spin"></div></div></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyC8ODVc9s7ItdYpETiKfegRSFsPyFC7mpY",
  authDomain: "decor-pro-7a94a.firebaseapp.com",
  projectId: "decor-pro-7a94a",
  storageBucket: "decor-pro-7a94a.firebasestorage.app",
  messagingSenderId: "243517980120",
  appId: "1:243517980120:web:2ef30c160b56b91b8786ad"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

db.enablePersistence().catch(function(e){console.log("Persistence:",e);});

// Data
var RUB=[{id:"mobilier",n:"Mobilier",i:"🪑",c:"#6366f1"},{id:"accessoires",n:"Accessoires",i:"🎭",c:"#ec4899"},{id:"regie",n:"Régie",i:"🏢",c:"#14b8a6"},{id:"luminaires",n:"Luminaires",i:"💡",c:"#f59e0b"},{id:"deco",n:"Déco",i:"🖼️",c:"#8b5cf6"},{id:"textiles",n:"Textiles",i:"🧵",c:"#ef4444"},{id:"graphiques",n:"Graphiques",i:"📋",c:"#06b6d4"},{id:"consommables",n:"Consommables",i:"📦",c:"#64748b"}];
var STAT=[{id:"a_sourcer",l:"À sourcer",c:"#64748b"},{id:"en_recherche",l:"En recherche",c:"#f59e0b"},{id:"valide",l:"Validé",c:"#3b82f6"},{id:"reserve",l:"Réservé",c:"#6366f1"},{id:"loue",l:"Loué",c:"#ec4899"},{id:"livre",l:"Livré",c:"#14b8a6"},{id:"installe",l:"Installé",c:"#10b981"},{id:"restitue",l:"Restitué",c:"#22c55e"}];
var STATD=[{id:"a_preparer",l:"À préparer",c:"#64748b"},{id:"en_cours",l:"En cours",c:"#f59e0b"},{id:"pret",l:"Prêt",c:"#10b981"},{id:"en_tournage",l:"En tournage",c:"#6366f1"},{id:"termine",l:"Terminé",c:"#22c55e"}];
var TPROJ=[{id:"film",l:"Film",i:"🎬"},{id:"serie",l:"Série",i:"📺"},{id:"pub",l:"Pub",i:"📢"},{id:"clip",l:"Clip",i:"🎵"},{id:"autre",l:"Autre",i:"📁"}];

// State
var CODE=localStorage.getItem("dp_code")||null;
var D={projets:[],loueurs:[],depenses:[]};
var V="home",P=null,DC=null,EL=null,LO=null,RB=null,M=null,MN=false,TB="rub",VW=null,VWC=null,VWI=0,SQ="",GSQ="",PHS=[],EDIT=null,MORE=false,LTAB="join",ONLINE=navigator.onLine,SYNCING=false,UNSUB=null;

window.addEventListener("online",function(){ONLINE=true;R();});
window.addEventListener("offline",function(){ONLINE=false;R();});

function gs(id){for(var i=0;i<STAT.length;i++)if(STAT[i].id===id)return STAT[i];return STAT[0];}
function gsd(id){for(var i=0;i<STATD.length;i++)if(STATD[i].id===id)return STATD[i];return STATD[0];}
function gr(id){for(var i=0;i<RUB.length;i++)if(RUB[i].id===id)return RUB[i];return null;}
function gt(id){for(var i=0;i<TPROJ.length;i++)if(TPROJ[i].id===id)return TPROJ[i];return TPROJ[0];}
function gl(id){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===id)return D.loueurs[i];return null;}
function fd(d){return d?new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}):"-";}
function fm(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function genCode(){var c="",chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";for(var i=0;i<6;i++)c+=chars[Math.floor(Math.random()*chars.length)];return c;}

// Firebase sync
function subscribeToProject(code){
  if(UNSUB)UNSUB();
  SYNCING=true;R();
  UNSUB=db.collection("projects").doc(code).onSnapshot(function(doc){
    SYNCING=false;
    if(doc.exists){
      var data=doc.data();
      D.projets=data.projets||[];
      D.loueurs=data.loueurs||[];
      D.depenses=data.depenses||[];
      if(P){var pid=P.id;P=null;for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===pid){P=D.projets[i];break;}}
      if(DC&&P&&P.decors){var did=DC.id;DC=null;for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===did){DC=P.decors[i];break;}}
      if(EL&&DC&&DC.elements){var eid=EL.id;EL=null;for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===eid){EL=DC.elements[i];break;}}
    }
    R();
  },function(err){console.error("Firestore:",err);SYNCING=false;R();});
}

function sv(){
  if(!CODE)return;
  SYNCING=true;R();
  db.collection("projects").doc(CODE).set({
    projets:D.projets,
    loueurs:D.loueurs,
    depenses:D.depenses,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){SYNCING=false;R();}).catch(function(err){console.error("Save:",err);SYNCING=false;R();});
}

function uploadPhoto(file,cb){
  var path="projects/"+CODE+"/photos/"+uid()+"_"+file.name;
  var ref=storage.ref(path);
  ref.put(file).then(function(snap){
    snap.ref.getDownloadURL().then(function(url){cb(url);});
  }).catch(function(err){console.error("Upload:",err);cb(null);});
}

// Navigation
window.go=function(v,id){
  VW=null;VWC=null;GSQ="";
  if(v==="home"){V="home";P=null;DC=null;EL=null;}
  else if(v==="proj"){for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===id){P=D.projets[i];break;}V="proj";DC=null;EL=null;}
  else if(v==="dec"){if(P&&P.decors)for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===id){DC=P.decors[i];break;}V="dec";EL=null;TB="rub";}
  else if(v==="el"){if(DC&&DC.elements)for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===id){EL=DC.elements[i];break;}V="el";}
  else if(v==="lou"){V="lou";LO=null;}
  else if(v==="loud"){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===id){LO=D.loueurs[i];break;}V="loud";}
  else if(v==="dep"){V="dep";}
  else if(v==="acc"){V="acc";SQ="";}
  else if(v==="search"){V="search";}
  R();
};
window.goTo=function(pId,dId,eId){
  for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===pId){P=D.projets[i];break;}
  if(dId&&P.decors)for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===dId){DC=P.decors[i];break;}
  if(eId&&DC&&DC.elements)for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===eId){EL=DC.elements[i];break;}
  V=eId?"el":(dId?"dec":"proj");R();
};
window.modal=function(m,id){M=m;RB=id||null;PHS=[];EDIT=null;MORE=false;R();};
window.edit=function(t,o){M="edit_"+t;EDIT=o;MORE=true;R();};
window.menu=function(v){MN=v;R();};
window.setTab=function(t){TB=t;R();};
window.setGSQ=function(q){GSQ=q;R();};
window.setSQ=function(q){SQ=q;R();};
window.toggleMore=function(){MORE=!MORE;R();};
window.openPh=function(c,i){VWC=c;VWI=i;VW=true;R();};
window.closePh=function(){VW=null;VWC=null;R();};
window.navPh=function(d){if(VWC){VWI+=d;if(VWI<0)VWI=VWC.length-1;if(VWI>=VWC.length)VWI=0;R();}};
window.setStat=function(s){if(EL){EL.statut=s;sv();R();}};
window.toggleUrg=function(){if(EL){EL.urgent=!EL.urgent;sv();R();}};
window.setLTab=function(t){LTAB=t;R();};
window.copyCode=function(){navigator.clipboard.writeText(CODE).then(function(){alert("Code copié: "+CODE);});};

window.joinProject=function(){
  var inp=document.getElementById("join-code");
  var code=inp?inp.value.toUpperCase().trim():"";
  if(code.length!==6){alert("Le code doit contenir 6 caractères");return;}
  db.collection("projects").doc(code).get().then(function(doc){
    if(doc.exists){CODE=code;localStorage.setItem("dp_code",CODE);subscribeToProject(CODE);}
    else{alert("Projet introuvable");}
  });
};

window.createProject=function(){
  var code=genCode();
  CODE=code;
  localStorage.setItem("dp_code",CODE);
  D={projets:[],loueurs:[],depenses:[]};
  db.collection("projects").doc(CODE).set({projets:[],loueurs:[],depenses:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){subscribeToProject(CODE);});
};

window.leaveProject=function(){
  if(!confirm("Quitter ce projet ?"))return;
  if(UNSUB)UNSUB();
  CODE=null;localStorage.removeItem("dp_code");
  D={projets:[],loueurs:[],depenses:[]};
  MN=false;R();
};

// Render
function R(){
  var h="";
  if(!CODE){h=rLogin();}
  else{
    h=rHeader();
    h+='<main class="cnt">';
    if(V==="home")h+=rHome();
    else if(V==="proj")h+=rProj();
    else if(V==="dec")h+=rDec();
    else if(V==="el")h+=rEl();
    else if(V==="lou")h+=rLou();
    else if(V==="loud")h+=rLouD();
    else if(V==="dep")h+=rDep();
    else if(V==="acc")h+=rAcc();
    else if(V==="search")h+=rSearch();
    h+='</main>';
    h+=rNavbar();
    if(M)h+=rModal();
    if(MN)h+=rMenu();
    if(VW&&VWC)h+=rViewer();
  }
  document.getElementById("app").innerHTML=h;
}

function rLogin(){
  var h='<div class="login-screen"><div class="login-logo">🎬</div><div class="login-title">Décor Pro</div><div class="login-sub">Gestion de décors collaborative</div><div class="login-box">';
  h+='<div class="login-tabs"><div class="login-tab'+(LTAB==="join"?" on":"")+'" onclick="setLTab(\'join\')">Rejoindre</div><div class="login-tab'+(LTAB==="create"?" on":"")+'" onclick="setLTab(\'create\')">Créer</div></div>';
  if(LTAB==="join"){
    h+='<p style="font-size:13px;color:#94a3b8;margin-bottom:16px">Entrez le code projet partagé par votre équipe</p>';
    h+='<div class="fld"><input id="join-code" class="code-input" placeholder="ABC123" maxlength="6" autocapitalize="characters"></div>';
    h+='<button class="btn p" onclick="joinProject()">Rejoindre le projet</button>';
  }else{
    h+='<p style="font-size:13px;color:#94a3b8;margin-bottom:16px">Créez un nouveau projet et partagez le code</p>';
    h+='<button class="btn p" onclick="createProject()">🚀 Créer un projet</button>';
  }
  h+='</div></div>';
  return h;
}

function rHeader(){
  var sc=SYNCING?"syncing":(ONLINE?"online":"offline");
  var st=SYNCING?"Sync...":(ONLINE?"Connecté":"Hors-ligne");
  var h='<header class="hdr"><div class="hdr-top"><div class="logo"><em>🎬</em>Décor Pro</div><div style="display:flex;align-items:center;gap:8px"><div class="sync-status '+sc+'"><div class="sync-dot"></div>'+st+'</div><button onclick="menu(true)" style="font-size:20px;padding:6px">☰</button></div></div>';
  h+='<div class="hdr-search"><input placeholder="Rechercher..." value="'+GSQ+'" oninput="setGSQ(this.value)" onfocus="go(\'search\')"></div></header>';
  if(V!=="home"&&V!=="search")h+=rBread();
  return h;
}

function rBread(){
  var h='<div class="bread"><span onclick="go(\'home\')">🏠</span><i>›</i>';
  if(P){h+='<span onclick="go(\'proj\',\''+P.id+'\')"'+(V==="proj"?' class="current"':'')+'>'+P.nom+'</span>';}
  if(DC){h+='<i>›</i><span onclick="go(\'dec\',\''+DC.id+'\')"'+(V==="dec"?' class="current"':'')+'>'+DC.nom+'</span>';}
  if(EL){h+='<i>›</i><span class="current">'+EL.nom+'</span>';}
  if(V==="lou"||V==="loud"){h+='<span class="current">Loueurs</span>';}
  if(V==="dep"){h+='<span class="current">Dépenses</span>';}
  if(V==="acc"){h+='<span class="current">Accessoires</span>';}
  h+='</div>';
  return h;
}

function rNavbar(){
  var h='<nav class="navbar">';
  h+='<div class="nav-item'+(V==="home"?" active":"")+'" onclick="go(\'home\')"><span class="icon">🏠</span><span class="label">Accueil</span></div>';
  h+='<div class="nav-item'+(V==="acc"?" active":"")+'" onclick="go(\'acc\')"><span class="icon">🎭</span><span class="label">Accessoires</span></div>';
  h+='<div class="nav-item'+(V==="dep"?" active":"")+'" onclick="go(\'dep\')"><span class="icon">💰</span><span class="label">Budget</span></div>';
  h+='<div class="nav-item'+(V==="lou"||V==="loud"?" active":"")+'" onclick="go(\'lou\')"><span class="icon">🏪</span><span class="label">Loueurs</span></div>';
  h+='</nav>';
  return h;
}

function rHome(){
  var np=D.projets.length,nd=0,ne=0,td=0;
  for(var i=0;i<D.projets.length;i++){var p=D.projets[i];nd+=p.decors?p.decors.length:0;if(p.decors)for(var j=0;j<p.decors.length;j++)ne+=p.decors[j].elements?p.decors[j].elements.length:0;}
  for(var i=0;i<D.depenses.length;i++)td+=parseFloat(D.depenses[i].montant)||0;

  var h='<div class="box" style="background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.2));margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#a5b4fc;margin-bottom:4px">CODE PROJET</div><div style="font-size:24px;font-weight:700;letter-spacing:3px">'+CODE+'</div></div><button class="abtn" onclick="copyCode()" style="font-size:11px">📋 Copier</button></div></div>';
  h+='<div class="stats"><div class="stat"><strong>'+np+'</strong><small>Projets</small></div><div class="stat"><strong>'+nd+'</strong><small>Décors</small></div><div class="stat"><strong>'+ne+'</strong><small>Éléments</small></div><div class="stat"><strong>'+fm(td).replace("€","")+'</strong><small>Budget</small></div></div>';
  h+='<div class="stit">Mes projets <button onclick="modal(\'np\')">+ Nouveau</button></div>';
  if(!D.projets.length){h+='<div class="empty"><div class="icon">🎬</div><p>Aucun projet</p></div>';}
  else{for(var i=0;i<D.projets.length;i++){var p=D.projets[i],t=gt(p.type),ndc=p.decors?p.decors.length:0;h+='<div class="card" onclick="go(\'proj\',\''+p.id+'\')"><div class="card-icon">'+t.i+'</div><div class="card-info"><h3>'+p.nom+'</h3><p>'+ndc+' décors'+(p.production?' • '+p.production:'')+'</p></div><div class="card-actions"><div class="card-act" onclick="event.stopPropagation();edit(\'projet\',D.projets['+i+'])">✏️</div></div></div>';}}
  h+='<button class="fab" onclick="modal(\'np\')">+</button>';
  return h;
}

function rProj(){
  if(!P)return"";
  var t=gt(P.type),nd=P.decors?P.decors.length:0;
  var h='<div class="page-title">'+t.i+' '+P.nom+'</div><div class="page-sub">'+(P.production||t.l)+' • '+nd+' décors</div>';
  h+='<div class="acts"><div class="abtn p" onclick="modal(\'nd\')">+ Décor</div><div class="abtn" onclick="edit(\'projet\',P)">✏️</div><div class="abtn d" onclick="delP()">🗑️</div></div>';
  h+='<div class="stit">Décors</div>';
  if(!P.decors||!P.decors.length){h+='<div class="empty"><div class="icon">🎭</div><p>Aucun décor</p></div>';}
  else{for(var i=0;i<P.decors.length;i++){var d=P.decors[i],st=gsd(d.statut),nel=d.elements?d.elements.length:0;h+='<div class="card" onclick="go(\'dec\',\''+d.id+'\')"><div class="card-icon">'+(d.interieur?'🏠':'🌳')+'</div><div class="card-info"><h3>'+d.nom+'</h3><p><span class="badge" style="background:'+st.c+'30;color:'+st.c+'">'+st.l+'</span> '+nel+' él.</p></div></div>';}}
  h+='<button class="fab" onclick="modal(\'nd\')">+</button>';
  return h;
}

function rDec(){
  if(!DC)return"";
  var st=gsd(DC.statut);
  var h='<div class="page-title">'+DC.nom+'</div><div class="page-sub"><span class="badge" style="background:'+st.c+'30;color:'+st.c+'">'+st.l+'</span></div>';
  h+='<div class="tabs"><div class="tab'+(TB==="rub"?" on":"")+'" onclick="setTab(\'rub\')">Rubriques</div><div class="tab'+(TB==="info"?" on":"")+'" onclick="setTab(\'info\')">Infos</div></div>';
  if(TB==="rub"){
    h+='<div class="rub-grid">';
    for(var i=0;i<RUB.length;i++){var r=RUB[i],cnt=0;if(DC.elements)for(var j=0;j<DC.elements.length;j++)if(DC.elements[j].rubrique===r.id)cnt++;h+='<div class="rub-card" onclick="modal(\'rub\',\''+r.id+'\')" style="border-left:3px solid '+r.c+'"><div class="icon">'+r.i+'</div><h4>'+r.n+'</h4><p>'+cnt+' él.</p>'+(cnt?'<div class="count">'+cnt+'</div>':'')+'</div>';}
    h+='</div>';
  }else{
    h+='<div class="box"><div class="row"><span>Type</span><span>'+(DC.interieur?'Intérieur':'Extérieur')+'</span></div></div>';
    h+='<div class="acts"><div class="abtn p" onclick="edit(\'decor\',DC)">✏️ Modifier</div><div class="abtn d" onclick="delD()">🗑️</div></div>';
  }
  h+='<button class="fab" onclick="modal(\'ne\')">+</button>';
  return h;
}

function rEl(){
  if(!EL)return"";
  var st=gs(EL.statut),rb=gr(EL.rubrique);
  var h='';
  if(EL.photos&&EL.photos.length){
    h+='<div class="photo-main" onclick="openPh(EL.photos,0)"><img src="'+EL.photos[0]+'"></div>';
    h+='<div class="photo-row">';
    for(var i=0;i<EL.photos.length;i++)h+='<div class="photo-thumb'+(i===0?' active':'')+'" onclick="openPh(EL.photos,'+i+')"><img src="'+EL.photos[i]+'"></div>';
    h+='<div class="photo-thumb photo-add" onclick="addPh()">+</div>';
    h+='</div>';
  }else{
    h+='<div class="photo-main" onclick="addPh()" style="flex-direction:column;gap:8px"><span style="font-size:40px">📷</span><span style="font-size:14px;color:#a5b4fc">Ajouter des photos</span></div>';
  }
  h+='<div class="page-title">'+EL.nom+(EL.urgent?' 🚨':'')+'</div>';
  h+='<div class="chips">';
  if(rb)h+='<div class="chip purple">'+rb.i+' '+rb.n+'</div>';
  if(EL.scene)h+='<div class="chip">🎬 Sc.'+EL.scene+'</div>';
  if(EL.role)h+='<div class="chip pink">👤 '+EL.role+'</div>';
  if(EL.dateJeu)h+='<div class="chip">📅 '+fd(EL.dateJeu)+'</div>';
  h+='</div>';
  h+='<div class="acts"><div class="abtn p" onclick="edit(\'element\',EL)">✏️</div><div class="abtn'+(EL.urgent?' d':'')+'" onclick="toggleUrg()">'+(EL.urgent?'🚨':'⚡')+' Urgent</div><div class="abtn" onclick="dupEl()">📋</div><div class="abtn d" onclick="delE()">🗑️</div></div>';
  h+='<div class="fld"><label>Statut</label><select onchange="setStat(this.value)" style="background:'+st.c+'20;border-color:'+st.c+'">';for(var i=0;i<STAT.length;i++)h+='<option value="'+STAT[i].id+'"'+(STAT[i].id===EL.statut?' selected':'')+'>'+STAT[i].l+'</option>';h+='</select></div>';
  if(EL.description){h+='<div class="box"><p style="font-size:13px">'+EL.description+'</p></div>';}
  return h;
}

function rLou(){
  var h='<div class="page-title">🏪 Loueurs</div><div class="page-sub">'+D.loueurs.length+' contacts</div>';
  if(!D.loueurs.length){h+='<div class="empty"><div class="icon">🏪</div><p>Aucun loueur</p></div>';}
  else{for(var i=0;i<D.loueurs.length;i++){var l=D.loueurs[i];h+='<div class="card" onclick="go(\'loud\',\''+l.id+'\')"><div class="card-icon">🏪</div><div class="card-info"><h3>'+l.nom+'</h3><p>'+(l.specialite||'Loueur')+'</p></div></div>';}}
  h+='<button class="fab" onclick="modal(\'nl\')">+</button>';
  return h;
}

function rLouD(){
  if(!LO)return"";
  var h='<div class="page-title">🏪 '+LO.nom+'</div>';
  h+='<div class="acts">';if(LO.telephone)h+='<a href="tel:'+LO.telephone+'" class="abtn p" style="text-decoration:none">📞 Appeler</a>';h+='<div class="abtn" onclick="edit(\'loueur\',LO)">✏️</div><div class="abtn d" onclick="delL()">🗑️</div></div>';
  h+='<div class="box">';if(LO.telephone)h+='<div class="row"><span>Tél</span><span>'+LO.telephone+'</span></div>';if(LO.email)h+='<div class="row"><span>Email</span><span>'+LO.email+'</span></div>';h+='</div>';
  return h;
}

function rDep(){
  var deps=D.depenses.slice();var total=0;for(var i=0;i<deps.length;i++)total+=parseFloat(deps[i].montant)||0;
  var h='<div class="page-title">💰 Dépenses</div><div class="page-sub">'+deps.length+' dépenses</div>';
  h+='<div class="total-box"><span>Total</span><strong>'+fm(total)+'</strong></div>';
  if(!deps.length){h+='<div class="empty"><div class="icon">💰</div><p>Aucune dépense</p></div>';}
  else{for(var i=0;i<deps.length;i++){var d=deps[i];h+='<div class="card" onclick="editDep(\''+d.id+'\')"><div class="card-info"><h3>'+(d.description||'Dépense')+'</h3><p>'+fd(d.date)+'</p></div><strong style="color:#10b981">'+fm(d.montant)+'</strong></div>';}}
  h+='<button class="fab" onclick="modal(\'ndep\')">+</button>';
  return h;
}

window.editDep=function(id){for(var i=0;i<D.depenses.length;i++)if(D.depenses[i].id===id){EDIT=D.depenses[i];M="edit_depense";R();break;}};

function rAcc(){
  var items=[];for(var i=0;i<D.projets.length;i++){var p=D.projets[i];if(!p.decors)continue;for(var j=0;j<p.decors.length;j++){var d=p.decors[j];if(!d.elements)continue;for(var k=0;k<d.elements.length;k++){var e=d.elements[k];if(e.rubrique==="accessoires")items.push({e:e,d:d,p:p});}}}
  var h='<div class="page-title">🎭 Accessoires</div><div class="page-sub">'+items.length+' accessoires</div>';
  if(!items.length){h+='<div class="empty"><div class="icon">🎭</div><p>Aucun accessoire</p></div>';}
  else{for(var i=0;i<items.length;i++){var x=items[i],e=x.e,st=gs(e.statut);h+='<div class="card'+(e.urgent?' urgent':'')+'" onclick="goTo(\''+x.p.id+'\',\''+x.d.id+'\',\''+e.id+'\')"><div class="card-icon">🎭</div><div class="card-info"><h3>'+e.nom+'</h3><p>'+x.d.nom+'</p></div><span class="badge" style="background:'+st.c+'30;color:'+st.c+'">'+st.l+'</span></div>';}}
  return h;
}

function rSearch(){
  var h='<div class="page-title">🔍 Recherche</div>';
  if(!GSQ||GSQ.length<2){h+='<div class="empty"><div class="icon">🔍</div><p>Tapez au moins 2 caractères</p></div>';}
  else{h+='<div class="empty"><div class="icon">😕</div><p>Aucun résultat</p></div>';}
  return h;
}

function rViewer(){
  if(!VWC||!VWC.length)return"";
  var ph=VWC[VWI];
  var h='<div class="viewer"><div class="viewer-hdr"><button onclick="closePh()">✕ Fermer</button><span>'+(VWI+1)+'/'+VWC.length+'</span></div>';
  if(VWC.length>1){h+='<button class="viewer-nav l" onclick="navPh(-1)">‹</button><button class="viewer-nav r" onclick="navPh(1)">›</button>';}
  h+='<div class="viewer-body"><img src="'+ph+'"></div></div>';
  return h;
}

  h+='<div class="box"><div style="font-size:11px;color:#64748b">Code projet</div><div style="font-size:20px;font-weight:700;letter-spacing:2px">'+CODE+'</div></div>';
  h+='<div class="menu-item" onclick="go(\'home\');menu(false)">🏠 Accueil</div>';
  h+='<div class="menu-item" onclick="go(\'acc\');menu(false)">🎭 Accessoires</div>';
  h+='<div class="menu-item" onclick="go(\'dep\');menu(false)">💰 Dépenses</div>';
  h+='<div class="menu-item" onclick="go(\'lou\');menu(false)">🏪 Loueurs</div>';
  h+='<div style="border-top:1px solid rgba(255,255,255,0.1);margin:16px 0"></div>';
  h+='<div class="menu-item" style="color:#ef4444" onclick="leaveProject()">🚪 Quitter</div>';
  h+='<p style="margin-top:20px;font-size:11px;color:#64748b">Décor Pro v8 Cloud</p>';
  h+='</div></div>';

}

    c+='<div class="fld"><label>Nom *</label><input id="f1" placeholder="Mon Film"></div>';

    c+='<div class="fld-row"><div class="fld"><label>Type</label><select id="f2"><option value="1"'+(EDIT.interieur?' selected':'')+'>🏠 Int.</option><option value="0"'+(!EDIT.interieur?' selected':'')+'>🌳 Ext.</option></select></div><div class="fld"><label>Statut</label><select id="f3">';for(var i=0;i<STATD.length;i++)c+='<option value="'+STATD[i].id+'"'+(STATD[i].id===EDIT.statut?' selected':'')+'>'+STATD[i].l+'</option>';c+='</select></div></div>';

    c+='<div class="toggle-more" onclick="toggleMore()">'+(MORE?'▲ Moins':'▼ Plus d\'options')+'</div>';
    c+='<div class="'+(MORE?'':'hidden')+'">';
    c+='<div class="fld"><label>Description</label><textarea id="f4"></textarea></div>';
    c+='<div class="fld-row"><div class="fld"><label>Scène</label><input id="f5" placeholder="12"></div><div class="fld"><label>Personnage</label><input id="f6" placeholder="Marie"></div></div>';
    c+='<div class="fld"><label>Date de jeu</label><input type="date" id="f7"></div>';
    c+='</div>';
    c+='<div id="upload-status"></div>';
    c+='<button class="btn p" id="save-btn" onclick="saveEl()">Ajouter</button><button class="btn s" onclick="modal(null)">Annuler</button>';
  }
  else if(M==="edit_element"&&EDIT){
    c='<div class="mbar"></div><div class="mtit">✏️ Modifier élément</div>';
    c+='<div class="fld"><label>Nom *</label><input id="f1" value="'+EDIT.nom+'"></div>';
    c+='<div class="fld-row"><div class="fld"><label>Rubrique</label><select id="f2">';for(var i=0;i<RUB.length;i++)c+='<option value="'+RUB[i].id+'"'+(RUB[i].id===EDIT.rubrique?' selected':'')+'>'+RUB[i].i+' '+RUB[i].n+'</option>';c+='</select></div><div class="fld"><label>Statut</label><select id="f3">';for(var i=0;i<STAT.length;i++)c+='<option value="'+STAT[i].id+'"'+(STAT[i].id===EDIT.statut?' selected':'')+'>'+STAT[i].l+'</option>';c+='</select></div></div>';
    c+='<div class="fld"><label>Description</label><textarea id="f4">'+(EDIT.description||"")+'</textarea></div>';
    c+='<div class="fld-row"><div class="fld"><label>Scène</label><input id="f5" value="'+(EDIT.scene||"")+'"></div><div class="fld"><label>Personnage</label><input id="f6" value="'+(EDIT.role||"")+'"></div></div>';
    c+='<div class="fld"><label>Date de jeu</label><input type="date" id="f7" value="'+(EDIT.dateJeu||"")+'"></div>';
    c+='<button class="btn p" onclick="updateEl()">Enregistrer</button><button class="btn s" onclick="modal(null)">Annuler</button>';
  }
  else if(M==="nl"){
    c='<div class="mbar"></div><div class="mtit">🏪 Nouveau loueur</div>';
    c+='<div class="fld"><label>Nom *</label><input id="f1"></div>';
    c+='<div class="fld"><label>Spécialité</label><input id="f2"></div>';
    c+='<div class="fld"><label>Téléphone</label><input type="tel" id="f3"></div>';
    c+='<div class="fld"><label>Email</label><input type="email" id="f4"></div>';
    c+='<button class="btn p" onclick="saveLo()">Ajouter</button><button class="btn s" onclick="modal(null)">Annuler</button>';
  }
  else if(M==="edit_loueur"&&EDIT){
    c='<div class="mbar"></div><div class="mtit">✏️ Modifier loueur</div>';
    c+='<div class="fld"><label>Nom *</label><input id="f1" value="'+EDIT.nom+'"></div>';
    c+='<div class="fld"><label>Spécialité</label><input id="f2" value="'+(EDIT.specialite||"")+'"></div>';
    c+='<div class="fld"><label>Téléphone</label><input type="tel" id="f3" value="'+(EDIT.telephone||"")+'"></div>';
    c+='<div class="fld"><label>Email</label><input type="email" id="f4" value="'+(EDIT.email||"")+'"></div>';
    c+='<button class="btn p" onclick="updateLo()">Enregistrer</button><button class="btn s" onclick="modal(null)">Annuler</button>';
  }
  else if(M==="ndep"){
    c='<div class="mbar"></div><div class="mtit">💰 Nouvelle dépense</div>';
    c+='<div class="fld"><label>Description *</label><input id="f1"></div>';
    c+='<div class="fld-row"><div class="fld"><label>Montant € *</label><input type="number" step="0.01" id="f2"></div><div class="fld"><label>Date</label><input type="date" id="f3" value="'+new Date().toISOString().split("T")[0]+'"></div></div>';

  }
  else if(M==="edit_depense"&&EDIT){

    c+='<div class="fld-row"><div class="fld"><label>Montant €</label><input type="number" step="0.01" id="f2" value="'+(EDIT.montant||"")+'"></div><div class="fld"><label>Date</label><input type="date" id="f3" value="'+(EDIT.date||"")+'"></div></div>';

  }
  else if(M==="rub"){
    var rb=gr(RB);if(!rb)return"";
    var els=[];if(DC&&DC.elements)for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].rubrique===rb.id)els.push(DC.elements[i]);
    c='<div class="mbar"></div><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div style="font-size:28px">'+rb.i+'</div><div><div style="font-size:16px;font-weight:600">'+rb.n+'</div><div style="font-size:12px;color:#64748b">'+els.length+' éléments</div></div></div>';

    c+='<button class="btn p" onclick="modal(\'ne\')">+ Ajouter</button>';

  return '<div class="modal" onclick="modal(null)"><div class="mpan" onclick="event.stopPropagation()">'+c+'</div></div>';

window.goToRubEl=function(eId){for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===eId){EL=DC.elements[i];break;}M=null;V="el";R();};

function gv(id){var el=document.getElementById(id);return el?el.value.trim():"";}

window.saveP=function(){var n=gv("f1");if(!n)return alert("Nom requis");D.projets.push({id:uid(),nom:n,type:gv("f2")||"film",production:gv("f3"),decors:[]});sv();M=null;R();};
window.updateP=function(){var n=gv("f1");if(!n)return alert("Nom requis");EDIT.nom=n;EDIT.type=gv("f2");EDIT.production=gv("f3");sv();M=null;R();};
window.saveDC=function(){var n=gv("f1");if(!n)return alert("Nom requis");if(!P.decors)P.decors=[];P.decors.push({id:uid(),nom:n,interieur:gv("f2")==="1",statut:gv("f3")||"a_preparer",elements:[]});sv();M=null;R();};
window.updateDC=function(){var n=gv("f1");if(!n)return alert("Nom requis");EDIT.nom=n;EDIT.interieur=gv("f2")==="1";EDIT.statut=gv("f3");sv();M=null;R();};
window.saveEl=function(){
  var n=gv("f1");if(!n)return alert("Nom requis");
  var btn=document.getElementById("save-btn");if(btn)btn.disabled=true;
  if(!DC.elements)DC.elements=[];
  var el={id:uid(),nom:n,rubrique:gv("f2")||"mobilier",statut:gv("f3")||"a_sourcer",description:gv("f4"),scene:gv("f5"),role:gv("f6"),dateJeu:gv("f7"),photos:[]};
  
  if(!PENDING_FILES||PENDING_FILES.length===0){
    DC.elements.push(el);sv();M=null;PENDING_FILES=[];R();return;
  }
  
  var status=document.getElementById("upload-status");
  var uploaded=0;var total=PENDING_FILES.length;
  if(status)status.innerHTML='<div class="upload-progress"><div style="font-size:12px">Upload... 0/'+total+'</div><div class="upload-bar"><div class="upload-fill" style="width:0%"></div></div></div>';
  
  for(var i=0;i<PENDING_FILES.length;i++){
    uploadPhoto(PENDING_FILES[i],function(url){
      uploaded++;
      if(url)el.photos.push(url);
      if(status)status.innerHTML='<div class="upload-progress"><div style="font-size:12px">Upload... '+uploaded+'/'+total+'</div><div class="upload-bar"><div class="upload-fill" style="width:'+Math.round(uploaded/total*100)+'%"></div></div></div>';
      if(uploaded===total){DC.elements.push(el);sv();M=null;PENDING_FILES=[];R();}
    });
  }
};
window.updateEl=function(){var n=gv("f1");if(!n)return alert("Nom requis");EDIT.nom=n;EDIT.rubrique=gv("f2");EDIT.statut=gv("f3");EDIT.description=gv("f4");EDIT.scene=gv("f5");EDIT.role=gv("f6");EDIT.dateJeu=gv("f7");sv();M=null;R();};
window.saveLo=function(){var n=gv("f1");if(!n)return alert("Nom requis");D.loueurs.push({id:uid(),nom:n,specialite:gv("f2"),telephone:gv("f3"),email:gv("f4")});sv();M=null;R();};
window.updateLo=function(){var n=gv("f1");if(!n)return alert("Nom requis");EDIT.nom=n;EDIT.specialite=gv("f2");EDIT.telephone=gv("f3");EDIT.email=gv("f4");sv();M=null;R();};
window.saveDep=function(){var m=gv("f2");if(!m)return alert("Montant requis");D.depenses.push({id:uid(),projetId:P?P.id:null,description:gv("f1"),montant:parseFloat(m),date:gv("f3")});sv();M=null;R();};
window.updateDep=function(){EDIT.description=gv("f1");EDIT.montant=parseFloat(gv("f2"));EDIT.date=gv("f3");sv();M=null;R();};
window.delDep=function(){if(!confirm("Supprimer?"))return;D.depenses=D.depenses.filter(function(d){return d.id!==EDIT.id;});sv();M=null;R();};
window.delP=function(){if(!confirm("Supprimer?"))return;D.projets=D.projets.filter(function(p){return p.id!==P.id;});sv();P=null;V="home";R();};
window.delD=function(){if(!confirm("Supprimer?"))return;P.decors=P.decors.filter(function(d){return d.id!==DC.id;});sv();DC=null;V="proj";R();};
window.delE=function(){if(!confirm("Supprimer?"))return;DC.elements=DC.elements.filter(function(e){return e.id!==EL.id;});sv();EL=null;V="dec";R();};
window.dupEl=function(){if(!confirm("Dupliquer cet élément?"))return;var c=JSON.parse(JSON.stringify(EL));c.id=uid();c.nom+=" (copie)";c.photos=[];DC.elements.push(c);sv();alert("Élément dupliqué!");R();};
window.delL=function(){if(!confirm("Supprimer?"))return;D.loueurs=D.loueurs.filter(function(l){return l.id!==LO.id;});sv();LO=null;V="lou";R();};

var PENDING_FILES=[];
window.prvPh=function(e){
  var files=e.target.files;PENDING_FILES=[];
  for(var i=0;i<files.length;i++)PENDING_FILES.push(files[i]);
  var pr=document.getElementById("phpr"),pl=document.getElementById("phpl");
  if(pr&&pl&&PENDING_FILES.length){pr.innerHTML='<div style="color:#a5b4fc;font-size:13px">📷 '+PENDING_FILES.length+' photo(s) sélectionnée(s)</div>';pl.style.display="none";}
};

window.addPh=function(){
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.multiple=true;inp.capture="environment";
  inp.onchange=function(e){
    var files=e.target.files;
    if(!files.length)return;
    var uploaded=0;var total=files.length;var success=0;
    alert("⏳ Upload de "+total+" photo(s)...");
    for(var i=0;i<files.length;i++){
      uploadPhoto(files[i],function(url){
        uploaded++;
        if(url){if(!EL.photos)EL.photos=[];EL.photos.push(url);success++;}
        if(uploaded===total){
          sv();R();
          if(success===total)alert("✅ "+success+" photo(s) ajoutée(s)!");
          else alert("⚠️ "+success+"/"+total+" photo(s) uploadée(s)");
        }
      });
    }
  };
  inp.click();
};

// Init
if(CODE){subscribeToProject(CODE);}else{R();}
</script>
