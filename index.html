<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Décor Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
button,input,select,textarea{font:inherit;font-size:16px;border:none;background:none;color:inherit}
.hdr{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
.logo em{font-style:normal;width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center}
.hbtn{width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:18px;cursor:pointer}
.cnt{padding:16px;padding-bottom:100px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px 6px;text-align:center}
.stat strong{display:block;font-size:20px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat small{font-size:9px;color:#64748b;text-transform:uppercase}
.stit{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:12px;letter-spacing:0.5px}
.card{background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative}
.card:active{background:rgba(255,255,255,0.1)}
.card.urgent{border-left:3px solid #ef4444}
.cicon{font-size:26px;width:44px;text-align:center}
.cinfo{flex:1;min-width:0}
.cinfo h3{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cinfo p{font-size:12px;color:#64748b}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600}
.tag{display:inline-block;padding:2px 6px;border-radius:8px;font-size:9px;background:rgba(99,102,241,0.2);color:#a5b4fc;margin-right:4px}
.fab{position:fixed;bottom:max(20px,calc(env(safe-area-inset-bottom)+12px));right:20px;width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:16px;font-size:32px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.5);z-index:90;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(0.95)}
.empty{text-align:center;padding:50px 20px;color:#64748b}
.empty i{font-size:48px;font-style:normal;display:block;margin-bottom:10px;opacity:0.5}
.bk{display:inline-flex;align-items:center;gap:4px;color:#6366f1;font-size:14px;cursor:pointer;margin-bottom:12px;background:none}
.ttl{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:16px}
.box{background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:16px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.row:last-child{border:none}
.row span:first-child{color:#64748b;font-size:13px}
.row span:last-child{font-size:13px;font-weight:500}
.acts{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.abtn{flex:1;min-width:60px;padding:12px 8px;border-radius:10px;background:rgba(255,255,255,0.05);font-size:13px;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.abtn:active{background:rgba(255,255,255,0.1)}
.abtn.p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.abtn.d{background:rgba(239,68,68,0.15);color:#ef4444}
.abtn.w{background:rgba(245,158,11,0.15);color:#f59e0b}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,0.05);color:#94a3b8;font-size:13px;cursor:pointer;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.mpan{background:#1e293b;border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(20px,calc(env(safe-area-inset-bottom)+12px));width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.mbar{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.mtit{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#f1f5f9}
.fld textarea{min-height:70px;resize:none}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:14px;border-radius:12px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:center}
.btn.p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn.s{background:rgba(255,255,255,0.05);color:#94a3b8}
.btn.d{background:rgba(239,68,68,0.15);color:#ef4444}
.drop{border:2px dashed rgba(99,102,241,0.4);border-radius:14px;padding:24px;text-align:center;cursor:pointer;margin-bottom:14px;background:rgba(99,102,241,0.05)}
.drop i{font-size:28px;font-style:normal;display:block;margin-bottom:6px}
.phgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.phgrid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}
.phmain{border-radius:14px;overflow:hidden;margin-bottom:14px;aspect-ratio:4/3;background:#1e293b;display:flex;align-items:center;justify-content:center;cursor:pointer}
.phmain img{width:100%;height:100%;object-fit:cover}
.phrow{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.phrow>div{width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid transparent}
.phrow>div.act{border-color:#6366f1}
.phrow img{width:100%;height:100%;object-fit:cover}
.phadd{background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:24px;color:#64748b}
.chip{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;background:rgba(255,255,255,0.1);margin-right:6px;margin-bottom:6px}
.menu{position:fixed;inset:0;z-index:150}
.mbg{position:absolute;inset:0;background:rgba(0,0,0,0.6)}
.mpnl{position:absolute;top:0;right:0;bottom:0;width:280px;background:#1e293b;padding:20px;padding-top:max(20px,env(safe-area-inset-top));overflow-y:auto}
.mitm{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;margin-bottom:6px;cursor:pointer;background:rgba(255,255,255,0.03)}
.mitm:active{background:rgba(255,255,255,0.08)}
.total{background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.2));border-radius:14px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.total span{color:#a5b4fc;font-size:13px}
.total strong{font-size:22px}
.accbox{background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.2);border-radius:12px;padding:12px;margin-bottom:14px}
.accbox h4{color:#ec4899;font-size:13px;margin-bottom:10px;font-weight:600}
.fltr{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.fltr button{padding:6px 12px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;white-space:nowrap}
.fltr button.on{background:#6366f1;color:#fff;border-color:#6366f1}
.dep{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.dep>div{flex:1}
.dep h4{font-size:14px;font-weight:600;margin-bottom:2px}
.dep p{font-size:11px;color:#64748b}
.dep strong{font-size:18px;color:#10b981}
.view{position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:250;display:flex;flex-direction:column}
.vhdr{display:flex;justify-content:space-between;align-items:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top))}
.vhdr button{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer}
.vbody{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.vbody img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.vftr{padding:16px;padding-bottom:max(16px,calc(env(safe-area-inset-bottom)+12px));text-align:center}
.vnav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:100px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);color:#fff;font-size:24px;cursor:pointer;border:none}
.vnav.l{left:0;border-radius:0 10px 10px 0}
.vnav.r{right:0;border-radius:10px 0 0 10px}
.srch{position:relative;margin-bottom:14px}
.srch input{width:100%;padding:12px 12px 12px 40px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05)}
.srch:before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px}
.alert{border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer}
.alert.red{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3)}
.alert.orange{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3)}
.alert.blue{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3)}
.alert.pink{background:rgba(236,72,153,0.15);border:1px solid rgba(236,72,153,0.3)}
.aicon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert.red .aicon{background:rgba(239,68,68,0.2)}
.alert.orange .aicon{background:rgba(245,158,11,0.2)}
.alert.blue .aicon{background:rgba(59,130,246,0.2)}
.alert.pink .aicon{background:rgba(236,72,153,0.2)}
.alert h4{font-size:13px;font-weight:600}
.hist{font-size:11px;color:#64748b;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px;margin-top:10px}
.hist div{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.hist div:last-child{border:none}
.check{display:flex;align-items:center;gap:10px;padding:10px 0}
.check input{width:20px;height:20px;accent-color:#6366f1}
.editbtn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:14px;border-radius:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:16px}
.portfolio{margin:16px 0}
.portfolio-title{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.05);border-radius:12px 12px 0 0;cursor:pointer}
.portfolio-title h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.portfolio-title span{font-size:12px;color:#64748b}
.portfolio-title .arrow{transition:transform 0.3s;font-size:12px}
.portfolio-title.open .arrow{transform:rotate(180deg)}
.portfolio-content{background:rgba(255,255,255,0.03);border-radius:0 0 12px 12px;overflow:hidden;max-height:0;transition:max-height 0.3s ease-out}
.portfolio-content.open{max-height:500px;overflow-y:auto}
.portfolio-scroll{display:flex;gap:8px;padding:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.portfolio-scroll::-webkit-scrollbar{height:6px}
.portfolio-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:3px}
.portfolio-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}
.portfolio-item{flex-shrink:0;width:100px;text-align:center}
.portfolio-item img{width:100px;height:100px;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s,transform 0.2s}
.portfolio-item img:hover{border-color:#6366f1;transform:scale(1.02)}
.portfolio-item p{font-size:10px;color:#94a3b8;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.portfolio-empty{padding:20px;text-align:center;color:#64748b;font-size:13px}
@media print{body{background:#fff!important;color:#000!important}.hdr,.fab,.acts,.tabs,.bk,.menu,.modal,.view{display:none!important}.cnt{padding:10px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var RUB=[{id:"mobilier",n:"Mobilier",i:"🪑",c:"#6366f1"},{id:"accessoires",n:"Accessoires",i:"🎭",c:"#ec4899"},{id:"regie",n:"Régie",i:"🏢",c:"#14b8a6"},{id:"luminaires",n:"Luminaires",i:"💡",c:"#f59e0b"},{id:"deco",n:"Déco",i:"🖼️",c:"#8b5cf6"},{id:"textiles",n:"Textiles",i:"🧵",c:"#ef4444"},{id:"graphiques",n:"Graphiques",i:"📋",c:"#06b6d4"},{id:"consommables",n:"Consommables",i:"📦",c:"#64748b"}];
var STAT=[{id:"a_sourcer",l:"À sourcer",c:"#64748b"},{id:"en_recherche",l:"En recherche",c:"#f59e0b"},{id:"valide",l:"Validé",c:"#3b82f6"},{id:"reserve",l:"Réservé",c:"#6366f1"},{id:"loue",l:"En location",c:"#ec4899"},{id:"livre",l:"Livré",c:"#14b8a6"},{id:"installe",l:"Installé",c:"#10b981"},{id:"restitue",l:"Restitué",c:"#22c55e"}];
var STATD=[{id:"a_preparer",l:"À préparer",c:"#64748b"},{id:"en_cours",l:"En cours",c:"#f59e0b"},{id:"pret",l:"Prêt",c:"#10b981"},{id:"en_tournage",l:"En tournage",c:"#6366f1"},{id:"termine",l:"Terminé",c:"#22c55e"}];
var TPROJ=[{id:"film",l:"Long-métrage",i:"🎬"},{id:"serie",l:"Série",i:"📺"},{id:"pub",l:"Publicité",i:"📢"},{id:"clip",l:"Clip",i:"🎵"},{id:"autre",l:"Autre",i:"📁"}];
var TDEP=[{id:"location",l:"Location"},{id:"achat",l:"Achat"},{id:"transport",l:"Transport"},{id:"fabrication",l:"Fabrication"},{id:"autre",l:"Autre"}];

var D=JSON.parse(localStorage.getItem("dp12")||'{"projets":[],"loueurs":[],"depenses":[],"collaborateurs":[],"notifAuto":false}');
if(!D.depenses)D.depenses=[];if(!D.collaborateurs)D.collaborateurs=[];if(D.notifAuto===undefined)D.notifAuto=false;

var V="home",P=null,DC=null,EL=null,LO=null,RB=null,M=null,MN=false,TB="rub",VW=null,VWC=null,VWI=0,FR="",FD="",SQ="",DS="date",PHS=[],EDIT=null,GSQ="",OPENPORT={};

function sv(){localStorage.setItem("dp12",JSON.stringify(D))}
function gs(id){for(var i=0;i<STAT.length;i++)if(STAT[i].id===id)return STAT[i];return STAT[0]}
function gsd(id){for(var i=0;i<STATD.length;i++)if(STATD[i].id===id)return STATD[i];return STATD[0]}
function gr(id){for(var i=0;i<RUB.length;i++)if(RUB[i].id===id)return RUB[i];return null}
function gt(id){for(var i=0;i<TPROJ.length;i++)if(TPROJ[i].id===id)return TPROJ[i];return null}
function gl(id){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===id)return D.loueurs[i];return null}
function fd(d){return d?new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}):"-"}
function fdt(d){return d?new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"-"}
function fm(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0)}
function uid(){return Date.now().toString()+Math.random().toString(36).substr(2,5)}

function addHist(obj,action){if(!obj.historique)obj.historique=[];obj.historique.push({date:new Date().toISOString(),action:action});if(obj.historique.length>20)obj.historique.shift();}

function sendMail(type,detail){
  if(!D.notifAuto||!D.collaborateurs.length)return;
  var emails=[];for(var i=0;i<D.collaborateurs.length;i++)emails.push(D.collaborateurs[i].email);
  var to=emails.join(","),subj="",body="",pn=P?P.nom:"",dn=DC?DC.nom:"",dt=new Date().toLocaleDateString("fr-FR");
  if(type==="projet"){subj="Décor Pro - Nouveau projet";body="Projet: "+detail+"\nDate: "+dt}
  else if(type==="decor"){subj="Décor Pro - Nouveau décor";body="Projet: "+pn+"\nDécor: "+detail+"\nDate: "+dt}
  else if(type==="element"){subj="Décor Pro - Nouvel élément";body="Projet: "+pn+"\nDécor: "+dn+"\nÉlément: "+detail+"\nDate: "+dt}
  var url="mailto:"+to+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  window.location.href=url;
}

function getAlerts(){
  var today=new Date();today.setHours(0,0,0,0);var tomorrow=new Date(today);tomorrow.setDate(tomorrow.getDate()+1);
  var alerts={aujourdhui:[],demain:[],retards:[],nonPrets:[],urgents:[]};
  for(var pi=0;pi<D.projets.length;pi++){var p=D.projets[pi];if(!p.decors)continue;
    for(var di=0;di<p.decors.length;di++){var d=p.decors[di];if(!d.elements)continue;
      for(var ei=0;ei<d.elements.length;ei++){var e=d.elements[ei];
        if(e.urgent)alerts.urgents.push({e:e,d:d,p:p});
        if(e.dateJeu){var dj=new Date(e.dateJeu);dj.setHours(0,0,0,0);if(dj.getTime()===today.getTime())alerts.aujourdhui.push({e:e,d:d,p:p});else if(dj.getTime()===tomorrow.getTime())alerts.demain.push({e:e,d:d,p:p});if(dj<=tomorrow&&e.statut!=="installe"&&e.statut!=="livre"&&e.statut!=="restitue")alerts.nonPrets.push({e:e,d:d,p:p});}
        if(e.dateRetour){var dr=new Date(e.dateRetour);dr.setHours(0,0,0,0);if(dr<today&&e.statut!=="restitue")alerts.retards.push({e:e,d:d,p:p});}}}}
  return alerts;
}

function globalSearch(q){
  if(!q||q.length<2)return[];q=q.toLowerCase();var results=[];
  for(var pi=0;pi<D.projets.length;pi++){var p=D.projets[pi];if(p.nom.toLowerCase().indexOf(q)>=0)results.push({type:"projet",item:p});if(!p.decors)continue;
    for(var di=0;di<p.decors.length;di++){var d=p.decors[di];if(d.nom.toLowerCase().indexOf(q)>=0)results.push({type:"decor",item:d,p:p});if(!d.elements)continue;
      for(var ei=0;ei<d.elements.length;ei++){var e=d.elements[ei];if(e.nom.toLowerCase().indexOf(q)>=0||(e.description&&e.description.toLowerCase().indexOf(q)>=0)||(e.tags&&e.tags.toLowerCase().indexOf(q)>=0)||(e.role&&e.role.toLowerCase().indexOf(q)>=0))results.push({type:"element",item:e,d:d,p:p});}}}
  for(var i=0;i<D.loueurs.length;i++){var l=D.loueurs[i];if(l.nom.toLowerCase().indexOf(q)>=0)results.push({type:"loueur",item:l});}
  return results.slice(0,20);
}

function getPhotosByRub(rubId){
  var photos=[];if(!DC||!DC.elements)return photos;
  for(var i=0;i<DC.elements.length;i++){var e=DC.elements[i];if(e.rubrique===rubId&&e.photos){for(var j=0;j<e.photos.length;j++)photos.push({data:e.photos[j].data,nom:e.nom,elId:e.id});}}
  return photos;
}

window.go=function(v,id){GSQ="";VW=null;VWC=null;
  if(v==="home"){V="home";P=null;DC=null;EL=null}
  else if(v==="proj"){for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===id){P=D.projets[i];break}V="proj"}
  else if(v==="dec"){for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===id){DC=P.decors[i];break}V="dec";TB="rub";OPENPORT={}}
  else if(v==="el"){for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===id){EL=DC.elements[i];break}V="el"}
  else if(v==="lou"){V="lou";LO=null}

function rAcc(){
  var items=[];

    for(var di=0;di<p.decors.length;di++){var d=p.decors[di];if(!d.elements)continue;

  var roles=[];for(var i=0;i<items.length;i++)if(items[i].e.role&&roles.indexOf(items[i].e.role)<0)roles.push(items[i].e.role);
  var filtered=[];for(var i=0;i<items.length;i++){var x=items[i];if(FR&&x.e.role!==FR)continue;if(FD&&x.e.dateJeu!==FD)continue;if(SQ){var q=SQ.toLowerCase();if((x.e.nom||"").toLowerCase().indexOf(q)<0&&(x.e.role||"").toLowerCase().indexOf(q)<0)continue;}filtered.push(x);}

  h+='<div class="fltr"><button class="'+(FR===""?"on":"")+'" onclick="setFR(\'\')">Tous</button>';for(var i=0;i<roles.length;i++)h+='<button class="'+(FR===roles[i]?"on":"")+'" onclick="setFR(\''+roles[i]+'\')">👤 '+roles[i]+'</button>';h+='</div>';
  h+='<div class="fld"><label>Date de jeu</label><input type="date" value="'+FD+'" onchange="setFD(this.value)"></div>';

  else{for(var i=0;i<filtered.length;i++){var x=filtered[i],e=x.e,st=gs(e.statut);
    h+='<div class="card'+(e.urgent?" urgent":"")+'" onclick="goToEl(\''+x.p.id+'\',\''+x.d.id+'\',\''+e.id+'\')">';

    h+='<div class="cinfo"><h3>'+e.nom+(e.urgent?' 🚨':'')+'</h3><p>'+(e.role?"👤 "+e.role:"")+(e.dateJeu?" 📅 "+fd(e.dateJeu):"")+'</p></div><span class="badge" style="background:'+st.c+'30;color:'+st.c+'">'+st.l+'</span></div>';}}

  var total=0,estim=0;for(var i=0;i<deps.length;i++){total+=parseFloat(deps[i].montant)||0;estim+=parseFloat(deps[i].estime)||0;}
  if(DS==="date")deps.sort(function(a,b){return new Date(b.date||0)-new Date(a.date||0)});else deps.sort(function(a,b){return(b.montant||0)-(a.montant||0)});
  var h='<button class="bk" onclick="go(\'back\')">← Retour</button><div class="ttl">💰 Dépenses</div><div class="sub">'+deps.length+' dépenses</div>';

  if(estim>0)h+='<div class="box" style="display:flex;justify-content:space-between"><span>Estimé: '+fm(estim)+'</span><span style="color:'+(total>estim?'#ef4444':'#10b981')+'">Écart: '+fm(total-estim)+'</span></div>';
  h+='<div class="fltr"><button class="'+(DS==="date"?"on":"")+'" onclick="setDS(\'date\')">📅 Date</button><button class="'+(DS==="montant"?"on":"")+'" onclick="setDS(\'montant\')">💶 Montant</button></div>';

    c+='<div class="fld"><label>Description</label><input id="f2" value="'+(EDIT.description||"")+'"></div>';
    c+='<div class="cols"><div class="fld"><label>Estimé €</label><input type="number" step="0.01" id="f3" value="'+(EDIT.estime||"")+'"></div><div class="fld"><label>Réel € *</label><input type="number" step="0.01" id="f4" value="'+(EDIT.montant||"")+'"></div></div>';

    c+='<button class="btn p" onclick="updateDep()">Enregistrer</button><button class="btn d" onclick="delDep()">Supprimer</button><button class="btn s" onclick="modal(null)">Annuler</button>';
  }
  else if(M==="nc"){

    c+='<button class="btn p" onclick="saveCollab()">Ajouter</button><button class="btn s" onclick="modal(null)">Annuler</button>';
  }
  else if(M==="rub"){
    var rb=gr(RB);if(!rb)return"";
    var els=[];if(DC&&DC.elements)for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].rubrique===rb.id)els.push(DC.elements[i]);
    c='<div class="mbar"></div><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div style="width:44px;height:44px;background:'+rb.c+'20;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px">'+rb.i+'</div><div><h3 style="margin:0">'+rb.n+'</h3><small style="color:#64748b">'+els.length+' éléments</small></div></div>';
    if(!els.length){c+='<div class="empty"><i>📦</i>Aucun élément</div>';}
    else{c+='<div style="max-height:50vh;overflow-y:auto">';for(var i=0;i<els.length;i++){var e=els[i],st=gs(e.statut);c+='<div class="card'+(e.urgent?" urgent":"")+'" onclick="goToElFromRub(\''+e.id+'\')">';if(e.photos&&e.photos.length)c+='<img src="'+e.photos[0].data+'" style="width:44px;height:44px;object-fit:cover;border-radius:8px">';else c+='<div style="width:44px;height:44px;background:rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center">📦</div>';c+='<div class="cinfo"><h3>'+e.nom+(e.urgent?' 🚨':'')+'</h3><span class="badge" style="background:'+st.c+'30;color:'+st.c+'">'+st.l+'</span></div></div>';}c+='</div>';}
    c+='<button class="btn p" style="margin-top:16px" onclick="modal(\'ne\')">➕ Ajouter élément</button>';
  }
  return '<div class="modal" onclick="modal(null)"><div class="mpan" onclick="event.stopPropagation()">'+c+'</div></div>';
}
