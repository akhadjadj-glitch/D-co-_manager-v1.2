<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Décor Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
button,input,select,textarea{font:inherit;font-size:16px;border:none;background:none;color:inherit}
.hdr{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
.logo em{font-style:normal;width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center}
.hbtn{width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:18px;cursor:pointer}
.cnt{padding:16px;padding-bottom:100px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px 6px;text-align:center}
.stat strong{display:block;font-size:20px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat small{font-size:9px;color:#64748b;text-transform:uppercase}
.stit{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:12px;letter-spacing:0.5px}
.card{background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.card:active{background:rgba(255,255,255,0.1)}
.cicon{font-size:26px;width:44px;text-align:center}
.cinfo{flex:1;min-width:0}
.cinfo h3{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cinfo p{font-size:12px;color:#64748b}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600}
.fab{position:fixed;bottom:max(20px,calc(env(safe-area-inset-bottom)+12px));right:20px;width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:16px;font-size:32px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.5);z-index:90;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(0.95)}
.empty{text-align:center;padding:50px 20px;color:#64748b}
.empty i{font-size:48px;font-style:normal;display:block;margin-bottom:10px;opacity:0.5}
.bk{display:inline-flex;align-items:center;gap:4px;color:#6366f1;font-size:14px;cursor:pointer;margin-bottom:12px;background:none}
.ttl{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:16px}
.box{background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:16px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.row:last-child{border:none}
.row span:first-child{color:#64748b;font-size:13px}
.row span:last-child{font-size:13px;font-weight:500}
.acts{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.abtn{flex:1;min-width:80px;padding:10px 8px;border-radius:10px;background:rgba(255,255,255,0.05);font-size:13px;text-align:center;cursor:pointer}
.abtn:active{background:rgba(255,255,255,0.1)}
.abtn.p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.abtn.d{color:#ef4444}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,0.05);color:#94a3b8;font-size:13px;cursor:pointer;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.mpan{background:#1e293b;border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(20px,calc(env(safe-area-inset-bottom)+12px));width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.mbar{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.mtit{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#f1f5f9}
.fld textarea{min-height:70px;resize:none}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:14px;border-radius:12px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:center}
.btn.p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn.s{background:rgba(255,255,255,0.05);color:#94a3b8}
.btn.d{background:rgba(239,68,68,0.15);color:#ef4444}
.drop{border:2px dashed rgba(99,102,241,0.4);border-radius:14px;padding:24px;text-align:center;cursor:pointer;margin-bottom:14px;background:rgba(99,102,241,0.05)}
.drop i{font-size:28px;font-style:normal;display:block;margin-bottom:6px}
.phgrid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.phgrid img{width:56px;height:56px;object-fit:cover;border-radius:8px}
.phmain{border-radius:14px;overflow:hidden;margin-bottom:14px;aspect-ratio:4/3;background:#1e293b;display:flex;align-items:center;justify-content:center}
.phmain img{width:100%;height:100%;object-fit:cover}
.phrow{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px}
.phrow>div{width:50px;height:50px;border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer}
.phrow img{width:100%;height:100%;object-fit:cover}
.chip{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;background:rgba(255,255,255,0.1);margin-right:6px;margin-bottom:6px}
.menu{position:fixed;inset:0;z-index:150}
.mbg{position:absolute;inset:0;background:rgba(0,0,0,0.6)}
.mpnl{position:absolute;top:0;right:0;bottom:0;width:260px;background:#1e293b;padding:20px;padding-top:max(20px,env(safe-area-inset-top));overflow-y:auto}
.mitm{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;margin-bottom:6px;cursor:pointer;background:rgba(255,255,255,0.03)}
.mitm:active{background:rgba(255,255,255,0.08)}
.total{background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.2));border-radius:14px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.total span{color:#a5b4fc;font-size:13px}
.total strong{font-size:22px}
.accbox{background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.2);border-radius:12px;padding:12px;margin-bottom:14px}
.accbox h4{color:#ec4899;font-size:13px;margin-bottom:10px;font-weight:600}
.fltr{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.fltr button{padding:6px 12px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;white-space:nowrap}
.fltr button.on{background:#6366f1;color:#fff;border-color:#6366f1}
.dep{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.dep>div{flex:1}
.dep h4{font-size:14px;font-weight:600;margin-bottom:2px}
.dep p{font-size:11px;color:#64748b}
.dep strong{font-size:18px;color:#10b981}
.view{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:250;display:flex;flex-direction:column}
.vhdr{display:flex;justify-content:space-between;align-items:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top))}
.vbody{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.vbody img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.vftr{padding:20px;padding-bottom:max(20px,calc(env(safe-area-inset-bottom)+12px))}
.srch{position:relative;margin-bottom:14px}
.srch input{width:100%;padding:10px 10px 10px 36px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05)}
.srch:before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
.alert{border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer}
.alert.red{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3)}
.alert.orange{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3)}
.alert.blue{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3)}
.alert.pink{background:rgba(236,72,153,0.15);border:1px solid rgba(236,72,153,0.3)}
.aicon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert.red .aicon{background:rgba(239,68,68,0.2);color:#ef4444}
.alert.orange .aicon{background:rgba(245,158,11,0.2);color:#f59e0b}
.alert.blue .aicon{background:rgba(59,130,246,0.2);color:#3b82f6}
.alert.pink .aicon{background:rgba(236,72,153,0.2);color:#ec4899}
.alert h4{font-size:13px;font-weight:600;margin-bottom:2px}
@media print{body{background:#fff!important;color:#000!important}.hdr,.fab,.acts,.tabs,.bk,.menu,.modal{display:none!important}.cnt{padding:10px}.pgrid{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:8px!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var RUB=[{id:"mobilier",n:"Mobilier",i:"🪑",c:"#6366f1"},{id:"accessoires",n:"Accessoires",i:"🎭",c:"#ec4899"},{id:"regie",n:"Régie",i:"🏢",c:"#14b8a6"},{id:"luminaires",n:"Luminaires",i:"💡",c:"#f59e0b"},{id:"deco",n:"Déco",i:"🖼️",c:"#8b5cf6"},{id:"textiles",n:"Textiles",i:"🧵",c:"#ef4444"},{id:"consommables",n:"Consommables",i:"📦",c:"#64748b"}];
var STAT=[{id:"a_sourcer",l:"À sourcer",c:"#64748b"},{id:"en_recherche",l:"En recherche",c:"#f59e0b"},{id:"valide",l:"Validé",c:"#3b82f6"},{id:"reserve",l:"Réservé",c:"#6366f1"},{id:"loue",l:"En location",c:"#ec4899"},{id:"livre",l:"Livré",c:"#14b8a6"},{id:"installe",l:"Installé",c:"#10b981"},{id:"restitue",l:"Restitué",c:"#22c55e"}];
var STATD=[{id:"a_preparer",l:"À préparer",c:"#64748b"},{id:"en_cours",l:"En cours",c:"#f59e0b"},{id:"pret",l:"Prêt",c:"#10b981"},{id:"en_tournage",l:"En tournage",c:"#6366f1"},{id:"termine",l:"Terminé",c:"#22c55e"}];
var TPROJ=[{id:"film",l:"Long-métrage",i:"🎬"},{id:"serie",l:"Série",i:"📺"},{id:"pub",l:"Publicité",i:"📢"},{id:"clip",l:"Clip",i:"🎵"}];
var TDEP=[{id:"location",l:"Location"},{id:"achat",l:"Achat"},{id:"transport",l:"Transport"},{id:"autre",l:"Autre"}];

var D=JSON.parse(localStorage.getItem("dp9")||'{"projets":[],"loueurs":[],"depenses":[],"collaborateurs":[],"notifAuto":false}');
if(!D.depenses)D.depenses=[];
if(!D.collaborateurs)D.collaborateurs=[];
if(D.notifAuto===undefined)D.notifAuto=false;

var V="home",P=null,DC=null,EL=null,LO=null,RB=null,M=null,MN=false,TB="rub",VW=null,FR="",FD="",SQ="",DS="date",PHS=[];

function sv(){localStorage.setItem("dp9",JSON.stringify(D))}
function gs(id){for(var i=0;i<STAT.length;i++)if(STAT[i].id===id)return STAT[i];return STAT[0]}
function gsd(id){for(var i=0;i<STATD.length;i++)if(STATD[i].id===id)return STATD[i];return STATD[0]}
function gr(id){for(var i=0;i<RUB.length;i++)if(RUB[i].id===id)return RUB[i];return null}
function gt(id){for(var i=0;i<TPROJ.length;i++)if(TPROJ[i].id===id)return TPROJ[i];return null}
function gl(id){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===id)return D.loueurs[i];return null}
function fd(d){return d?new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}):"-"}
function fm(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0)}

function sendMail(type,detail){
  if(!D.notifAuto||!D.collaborateurs.length)return;
  var emails=[];
  for(var i=0;i<D.collaborateurs.length;i++)emails.push(D.collaborateurs[i].email);
  var to=emails.join(",");
  var subj="",body="";
  var pn=P?P.nom:"";
  var dn=DC?DC.nom:"";
  var dt=new Date().toLocaleDateString("fr-FR");
  
  if(type==="projet"){
    subj="Décor Pro - Nouveau projet: "+detail;
    body="Bonjour,\n\nUn nouveau projet a été créé:\n\nProjet: "+detail+"\nDate: "+dt+"\n\nCordialement";
  }else if(type==="decor"){
    subj="Décor Pro - Nouveau décor: "+detail;
    body="Bonjour,\n\nUn nouveau décor a été créé:\n\nProjet: "+pn+"\nDécor: "+detail+"\nDate: "+dt+"\n\nCordialement";
  }else if(type==="element"){
    subj="Décor Pro - Nouvel élément: "+detail;
    body="Bonjour,\n\nUn nouvel élément a été ajouté:\n\nProjet: "+pn+"\nDécor: "+dn+"\nÉlément: "+detail+"\nDate: "+dt+"\n\nCordialement";
  }else if(type==="photo"){
    subj="Décor Pro - Nouvelle photo: "+detail;
    body="Bonjour,\n\nUne photo a été ajoutée:\n\nProjet: "+pn+"\nDécor: "+dn+"\nÉlément: "+detail+"\nDate: "+dt+"\n\nCordialement";
  }else if(type==="statut"){
    subj="Décor Pro - Statut modifié: "+detail.nom;
    body="Bonjour,\n\nUn statut a été modifié:\n\nProjet: "+pn+"\nDécor: "+dn+"\nÉlément: "+detail.nom+"\nNouveau statut: "+detail.statut+"\nDate: "+dt+"\n\nCordialement";
  }
  
  var url="mailto:"+to+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  window.location.href=url;
}

function getAlerts(){
  var today=new Date();today.setHours(0,0,0,0);
  var tomorrow=new Date(today);tomorrow.setDate(tomorrow.getDate()+1);
  var alerts={aujourdhui:[],demain:[],retards:[],nonPrets:[]};
  
  for(var pi=0;pi<D.projets.length;pi++){
    var p=D.projets[pi];
    if(!p.decors)continue;
    for(var di=0;di<p.decors.length;di++){
      var d=p.decors[di];
      if(!d.elements)continue;
      for(var ei=0;ei<d.elements.length;ei++){
        var e=d.elements[ei];
        if(e.dateJeu){
          var dj=new Date(e.dateJeu);dj.setHours(0,0,0,0);
          if(dj.getTime()===today.getTime())alerts.aujourdhui.push({e:e,d:d,p:p});
          else if(dj.getTime()===tomorrow.getTime())alerts.demain.push({e:e,d:d,p:p});
          if(dj<=tomorrow&&e.statut!=="installe"&&e.statut!=="livre"&&e.statut!=="restitue")alerts.nonPrets.push({e:e,d:d,p:p});
        }
        if(e.dateRetour){
          var dr=new Date(e.dateRetour);dr.setHours(0,0,0,0);
          if(dr<today&&e.statut!=="restitue")alerts.retards.push({e:e,d:d,p:p});
        }
      }
    }
  }
  return alerts;
}

window.go=function(v,id){
  if(v==="home"){V="home";P=null;DC=null;EL=null}
  else if(v==="proj"){for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===id){P=D.projets[i];break}V="proj"}
  else if(v==="dec"){for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===id){DC=P.decors[i];break}V="dec";TB="rub"}
  else if(v==="el"){for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===id){EL=DC.elements[i];break}V="el"}
  else if(v==="lou"){V="lou";LO=null}
  else if(v==="loud"){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===id){LO=D.loueurs[i];break}V="loud"}
  else if(v==="acc"){V="acc";FR="";FD="";SQ=""}
  else if(v==="dep"){V="dep"}
  else if(v==="collab"){V="collab"}
  else if(v==="print"){V="print"}
  else if(v==="back"){
    if(V==="el"){V="dec";EL=null}
    else if(V==="dec"){V="proj";DC=null}
    else if(V==="proj"||V==="collab"){V="home";P=null}
    else if(V==="loud"){V="lou";LO=null}
    else if(V==="acc"||V==="dep"){V=P?"proj":"home"}
    else if(V==="print"){V="dec";TB="ph"}
    else{V="home"}
  }
  R();
};

window.modal=function(m,id){M=m;RB=id||null;PHS=[];R()};
window.menu=function(v){MN=v;R()};
window.setTab=function(t){TB=t;R()};
window.setFR=function(r){FR=r;R()};
window.setFD=function(d){FD=d;R()};
window.setSQ=function(q){SQ=q;R()};
window.setDS=function(s){DS=s;R()};
window.setVW=function(i){VW=i;R()};
window.setStat=function(s){var old=EL.statut;EL.statut=s;sv();sendMail("statut",{nom:EL.nom,statut:gs(s).l});R()};
window.toggleNotif=function(){D.notifAuto=!D.notifAuto;sv();R()};

function R(){
  var h="";
  h+='<header class="hdr"><div class="logo"><em>🎬</em>Décor Pro</div><button class="hbtn" onclick="menu(true)">☰</button></header>';
  h+='<main class="cnt">';
  if(V==="home")h+=rHome();
  else if(V==="proj")h+=rProj();
  else if(V==="dec")h+=rDec();
  else if(V==="el")h+=rEl();
  else if(V==="lou")h+=rLou();
  else if(V==="loud")h+=rLouD();
  else if(V==="acc")h+=rAcc();
  else if(V==="dep")h+=rDep();
  else if(V==="collab")h+=rCollab();
  else if(V==="print")h+=rPrint();
  h+="</main>";
  if(M)h+=rModal();
  if(MN)h+=rMenu();
  if(VW!==null)h+=rView();
  document.getElementById("app").innerHTML=h;
}

function rHome(){
  var np=D.projets.length,nd=0,ne=0,nl=D.loueurs.length;
  var td=0;
  for(var i=0;i<D.depenses.length;i++)td+=parseFloat(D.depenses[i].montant)||0;
  for(var i=0;i<D.projets.length;i++){
    var p=D.projets[i];
    nd+=p.decors?p.decors.length:0;
    if(p.decors)for(var j=0;j<p.decors.length;j++)ne+=p.decors[j].elements?p.decors[j].elements.length:0;
  }
  
  var alerts=getAlerts();
  var h='<div class="stats">';
  h+='<div class="stat"><strong>'+np+'</strong><small>Projets</small></div>';
  h+='<div class="stat"><strong>'+nd+'</strong><small>Décors</small></div>';
  h+='<div class="stat"><strong>'+ne+'</strong><small>Éléments</small></div>';
  h+='<div class="stat"><strong>'+nl+'</strong><small>Loueurs</small></div>';
  h+="</div>";
  
  if(alerts.retards.length>0)h+='<div class="alert red" onclick="go(\'acc\')"><div class="aicon">⚠️</div><div><h4>'+alerts.retards.length+' retour(s) en retard</h4></div></div>';
  if(alerts.nonPrets.length>0)h+='<div class="alert orange" onclick="go(\'acc\')"><div class="aicon">🚨</div><div><h4>'+alerts.nonPrets.length+' accessoire(s) non prêt(s)</h4></div></div>';
  if(alerts.aujourdhui.length>0)h+='<div class="alert pink" onclick="go(\'acc\')"><div class="aicon">🎬</div><div><h4>'+alerts.aujourdhui.length+' accessoire(s) aujourd\'hui</h4></div></div>';
  if(alerts.demain.length>0)h+='<div class="alert blue" onclick="go(\'acc\')"><div class="aicon">📅</div><div><h4>'+alerts.demain.length+' accessoire(s) demain</h4></div></div>';
  
  if(td>0)h+='<div class="total"><span>💰 Total dépenses</span><strong>'+fm(td)+'</strong></div>';
  
  h+='<div class="stit">Projets</div>';

    if(D.loueurs.length){

      c+='</div>';
    }
    c+='<button class="btn p" style="margin-top:16px" onclick="modal(\'ne\')">➕ Ajouter</button>';

  return '<div class="modal" onclick="modal(null)"><div class="mpan" onclick="event.stopPropagation()">'+c+'</div></div>';

window.prvPh=function(e){
  var files=e.target.files;
  for(var i=0;i<files.length;i++){
    (function(file){
      var r=new FileReader();
      r.onload=function(ev){PHS.push(ev.target.result);updPh()};
      r.readAsDataURL(file);
    })(files[i]);
  }
};

function updPh(){
  var pr=document.getElementById("phpr"),pl=document.getElementById("phpl");
  if(pr&&pl){
    if(PHS.length){
      var h="";
      for(var i=0;i<PHS.length;i++)h+='<img src="'+PHS[i]+'" style="width:50px;height:50px;object-fit:cover;border-radius:6px;margin:2px">';
      pr.innerHTML=h;pl.style.display="none";
    }else{pr.innerHTML="";pl.style.display="block";}
  }
}

window.addPh=function(){
  var i=document.createElement("input");
  i.type="file";i.accept="image/*";i.multiple=true;
  i.onchange=function(e){
    var files=e.target.files;
    for(var j=0;j<files.length;j++){
      (function(file,last){
        var r=new FileReader();
        r.onload=function(ev){
          if(!EL.photos)EL.photos=[];
          EL.photos.push({data:ev.target.result});
          sv();
          if(last)sendMail("photo",EL.nom);
          R();
        };
        r.readAsDataURL(file);
      })(files[j],j===files.length-1);
    }
  };
  i.click();
};

window.delPh=function(){if(confirm("Supprimer?")){EL.photos.splice(VW,1);sv();VW=null;R()}};

window.saveP=function(){
  var n=document.getElementById("f1").value.trim();
  if(!n)return alert("Nom requis");
  var p={id:Date.now().toString(),nom:n,type:document.getElementById("f2").value,production:document.getElementById("f3").value,realisateur:document.getElementById("f4").value,chefDeco:document.getElementById("f5").value,decors:[]};
  D.projets.push(p);sv();M=null;
  sendMail("projet",n);
  R();
};

window.saveDC=function(){
  var n=document.getElementById("f1").value.trim();
  if(!n)return alert("Nom requis");
  if(!P.decors)P.decors=[];
  P.decors.push({id:Date.now().toString(),nom:n,adresse:document.getElementById("f2").value,interieur:document.getElementById("f3").value==="1",studio:document.getElementById("f4").value==="1",statut:document.getElementById("f5").value,dateInstallation:document.getElementById("f6").value,dateTournage:document.getElementById("f7").value,elements:[]});
  sv();M=null;
  sendMail("decor",n);
  R();
};

window.saveEl=function(){
  var n=document.getElementById("f1").value.trim();
  if(!n)return alert("Nom requis");
  if(!DC.elements)DC.elements=[];
  var el={id:Date.now().toString(),nom:n,rubrique:document.getElementById("f2").value,statut:document.getElementById("f3").value,description:document.getElementById("f4").value,dimensions:document.getElementById("f5").value,quantite:document.getElementById("f6").value,couleur:document.getElementById("f7").value,matiere:document.getElementById("f8").value,role:document.getElementById("f9")?document.getElementById("f9").value:"",dateJeu:document.getElementById("f10")?document.getElementById("f10").value:"",loueurId:document.getElementById("f11")?document.getElementById("f11").value:"",coutLocation:document.getElementById("f12")?document.getElementById("f12").value:"",caution:document.getElementById("f13")?document.getElementById("f13").value:"",dateDepart:document.getElementById("f14")?document.getElementById("f14").value:"",dateRetour:document.getElementById("f15")?document.getElementById("f15").value:"",photos:[]};

  DC.elements.push(el);sv();M=null;PHS=[];

window.saveLo=function(){
  var n=document.getElementById("f1").value.trim();
  if(!n)return alert("Nom requis");
  D.loueurs.push({id:Date.now().toString(),nom:n,specialite:document.getElementById("f2").value,contact:document.getElementById("f3").value,telephone:document.getElementById("f4").value,email:document.getElementById("f5").value,adresse:document.getElementById("f6").value});

window.saveDep=function(){
  var m=document.getElementById("f3").value;

  D.depenses.push({id:Date.now().toString(),projetId:P?P.id:null,type:document.getElementById("f1").value,description:document.getElementById("f2").value,montant:parseFloat(m),date:document.getElementById("f4").value,fournisseur:document.getElementById("f5").value});

  var n=document.getElementById("f1").value.trim();

  sv();M=null;R();

window.delCollab=function(i){if(confirm("Supprimer?")){D.collaborateurs.splice(i,1);sv();R()}};
window.delP=function(){if(confirm("Supprimer ce projet?")){for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===P.id){D.projets.splice(i,1);break}sv();P=null;V="home";R()}};
window.delD=function(){if(confirm("Supprimer ce décor?")){for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===DC.id){P.decors.splice(i,1);break}sv();DC=null;V="proj";R()}};
window.delE=function(){if(confirm("Supprimer?")){for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===EL.id){DC.elements.splice(i,1);break}sv();EL=null;V="dec";R()}};
window.delL=function(){if(confirm("Supprimer?")){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===LO.id){D.loueurs.splice(i,1);break}sv();LO=null;V="lou";R()}};

window.expData=function(){
  var b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="decor-pro-"+new Date().toISOString().split("T")[0]+".json";
  a.click();MN=false;R();
};

window.impData=function(e){
  var f=e.target.files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.projets){D=d;if(!D.depenses)D.depenses=[];if(!D.collaborateurs)D.collaborateurs=[];sv();MN=false;alert("Importé!");R();}
    }catch(err){alert("Erreur");}
  };
  r.readAsText(f);
};

if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
R();
})();
